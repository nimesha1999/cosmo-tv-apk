name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK platform + build-tools
        run: |
          # ubuntu-latest has SDK pre-installed at ANDROID_SDK_ROOT
          echo "SDK root: $ANDROID_SDK_ROOT"
          echo "ANDROID_HOME: $ANDROID_HOME"
          # Accept all licences non-interactively
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Install the platform and build tools we need
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Generate Gradle Wrapper
        run: |
          chmod +x gradlew || true
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk cosmo-tv.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmo-tv-apk
          path: cosmo-tv.apk
          retention-days: 90

      - name: Delete old release (if exists)
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Cosmo TV — Fire Stick APK"
          body: |
            ## 📺 Cosmo TV for Fire Stick

            ### How to install on your Fire Stick:

            **Step 1 — Enable unknown apps (one-time setup):**
            1. Fire Stick Settings → My Fire TV → Developer Options
            2. Turn on **Install Unknown Apps**
            3. Find **Downloader** in the list and enable it

            **Step 2 — Download & install:**
            1. Open the **Downloader** app on your Fire Stick
            2. Enter this URL:
               `https://github.com/nimesha1999/cosmo-tv-apk/releases/download/latest/cosmo-tv.apk`
            3. Tap **Go** → **Download** → **Install**

            ### What's included:
            - ✅ Full-screen TV interface
            - ✅ D-pad navigation (arrow keys move between buttons/links)
            - ✅ Play/Pause button on remote works
            - ✅ Fast-forward/Rewind buttons (+10s / -10s)
            - ✅ Back button navigates history
            - ✅ Videos play inline and go fullscreen automatically
            - ✅ Screen stays on during playback
            - ✅ Login session saved between app restarts
          files: cosmo-tv.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
