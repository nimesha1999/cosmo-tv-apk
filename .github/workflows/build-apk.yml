name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cosmo-tv-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Cosmo TV APK
          body: |
            ## Cosmo TV for Fire Stick

            Download the APK below and sideload it on your Fire Stick using the Downloader app.

            **How to install:**
            1. On Fire Stick: Settings → My Fire TV → Developer Options → Install Unknown Apps → enable for Downloader
            2. Open the Downloader app
            3. Enter this URL and download the APK
            4. Install it
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
